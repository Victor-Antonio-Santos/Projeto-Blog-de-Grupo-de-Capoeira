spring.application.name=grupo-capoeira-mundial
spring.datasource.url=jdbc:h2:file:${jboss.server.data.dir:./data}/capoeira-mundial;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
app.upload-dir=${UPLOAD_DIR:uploads}
app.admin.username=${CAPOEIRA_ADMIN_USERNAME:admin}
app.admin.password=${CAPOEIRA_ADMIN_PASSWORD:CapoeiraAdmin@2026}
server.error.whitelabel.enabled=false
spring.thymeleaf.cache=false
