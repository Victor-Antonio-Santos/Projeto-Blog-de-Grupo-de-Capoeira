<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editar conteúdo</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body class="admin-shell"><aside th:replace="~{fragments/admin :: sidebar}"></aside><main class="admin-main form-main"><header><div><span class="overline">EDIÇÃO</span><h1 th:text="|Editar ${type}|">Editar</h1><p>Campos marcados são exibidos publicamente.</p></div></header>
<form class="content-form" th:object="${item}" th:action="@{|/admin/${type == 'evento' ? 'eventos' : type == 'integrante' ? 'integrantes' : type == 'video' ? 'videos' : type == 'treino' ? 'agenda' : type == 'galeria' ? 'galeria' : type == 'conteudo' ? 'conteudo' : 'contatos'}|}" method="post" enctype="multipart/form-data"><input type="hidden" th:field="*{id}">
<th:block th:if="${type == 'evento'}"><label>Título<input th:field="*{title}" required></label><label>Descrição<textarea th:field="*{description}" rows="5"></textarea></label><div class="form-row"><label>Data<input type="date" th:field="*{eventDate}" required></label><label>Horário<input type="time" th:field="*{eventTime}"></label></div><label>Local<input th:field="*{location}" required></label><label>Status<select th:field="*{status}"><option value="FUTURO">Futuro</option><option value="REALIZADO">Realizado</option><option value="CANCELADO">Cancelado</option></select></label><label>Cartaz<input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" data-preview></label></th:block>
<th:block th:if="${type == 'integrante'}"><div class="form-row"><label>Nome<input th:field="*{name}" required></label><label>Nome de capoeira<input th:field="*{nickname}"></label></div><div class="form-row"><label>Graduação<input th:field="*{graduation}" required></label><label>Função<input th:field="*{role}" required></label></div><label>Biografia<textarea th:field="*{biography}" rows="5"></textarea></label><label>Foto<input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" data-preview></label></th:block>
<th:block th:if="${type == 'video'}"><label>Título<input th:field="*{title}" required></label><label>Descrição<textarea th:field="*{description}" rows="4"></textarea></label><label>Link do YouTube<input type="url" th:field="*{youtubeUrl}"></label><div class="form-row"><label>Arquivo MP4<input type="file" name="media" accept=".mp4"></label><label>Thumbnail<input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" data-preview></label></div><label>Data de publicação<input type="date" th:field="*{publishedAt}"></label></th:block>
<th:block th:if="${type == 'treino'}"><label>Dia da semana<input th:field="*{weekday}" required></label><div class="form-row"><label>Início<input type="time" th:field="*{startTime}" required></label><label>Fim<input type="time" th:field="*{endTime}" required></label></div><label>Nome do local<input th:field="*{venue}" required></label><label>Cidade/Estado<input th:field="*{cityState}" required></label><label>Link Google Maps<input type="url" th:field="*{mapsUrl}"></label><label>Observação<input th:field="*{notes}"></label></th:block>
<th:block th:if="${type == 'galeria'}"><label>Descrição da imagem<input th:field="*{altText}"></label><label>Legenda<input th:field="*{caption}"></label><label>Foto<input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" data-preview required></label></th:block>
<th:block th:if="${type == 'conteudo'}"><label>Identificador<input th:field="*{contentKey}" readonly></label><label>Nome do conteúdo<input th:field="*{label}"></label><label>Texto<textarea th:field="*{contentValue}" rows="10"></textarea></label></th:block>
<th:block th:if="${type == 'contato'}"><div class="form-row"><label>Tipo<input th:field="*{type}" placeholder="Instagram, WhatsApp..."></label><label>Rótulo<input th:field="*{label}"></label></div><label>Valor<input th:field="*{value}"></label><label>Link<input type="url" th:field="*{url}"></label><label class="check"><input type="checkbox" th:field="*{visible}"> Visível no site</label></th:block>
<img class="upload-preview" hidden alt="Pré-visualização"><div class="form-actions"><button class="action" type="submit">Salvar alterações</button><a href="javascript:history.back()">Cancelar</a></div></form><script th:src="@{/js/admin.js(v=2)}"></script></main></body></html>
