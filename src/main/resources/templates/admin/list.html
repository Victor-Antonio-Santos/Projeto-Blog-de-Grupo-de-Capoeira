<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gerenciar conteúdo</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body class="admin-shell"><aside th:replace="~{fragments/admin :: sidebar}"></aside><main class="admin-main"><header><div><span class="overline">CONTEÚDO</span><h1 th:text="${#strings.capitalize(section)}">Itens</h1><p>Crie, edite e organize o que aparece no site.</p></div><a class="action" th:unless="${section == 'conteudo'}" th:href="@{|/admin/${section}/novo|}">+ Adicionar</a></header><div class="flash success" th:if="${success}" th:text="${success}"></div><section class="data-list"><div class="data-head"><span>Item</span><span>Detalhes</span><span>Ações</span></div><article th:each="item : ${items}" th:switch="${section}">
<div th:case="'eventos'"><strong th:text="${item.title}"></strong><small th:text="${item.eventDate}"></small></div><div th:case="'integrantes'"><strong th:text="${item.name}"></strong><small th:text="${item.nickname}"></small></div><div th:case="'videos'"><strong th:text="${item.title}"></strong><small th:text="${item.publishedAt}"></small></div><div th:case="'agenda'"><strong th:text="${item.venue}"></strong><small th:text="${item.weekday}"></small></div><div th:case="'galeria'"><strong th:text="${item.altText}"></strong><small th:text="${item.caption}"></small></div><div th:case="'conteudo'"><strong th:text="${item.label}"></strong><small th:text="${item.contentKey}"></small></div><div th:case="'contatos'"><strong th:text="${item.label}"></strong><small th:text="${item.type}"></small></div>
<span th:case="'eventos'" th:text="${item.status}"></span><span th:case="'integrantes'" th:text="${item.role}"></span><span th:case="'videos'" th:text="${item.youtubeUrl}"></span><span th:case="'agenda'" th:text="${item.cityState}"></span><span th:case="'galeria'" th:text="${item.imageUrl}"></span><span th:case="'conteudo'" th:text="${item.contentValue}"></span><span th:case="'contatos'" th:text="${item.value}"></span>
<div class="row-actions"><a th:if="${section != 'galeria'}" th:href="@{|/admin/${section}/${item.id}|}">Editar</a><form th:if="${section != 'conteudo'}" th:action="@{|/admin/${section}/${item.id}/excluir|}" method="post" onsubmit="return confirm('Excluir este registro?')"><button>Excluir</button></form></div></article><div class="empty" th:if="${#lists.isEmpty(items)}">Nada por aqui ainda.</div></section></main></body></html>
